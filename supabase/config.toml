# Supabase CLI — https://supabase.com/docs/guides/cli/config
#
# Cadastro e login chamam Edge Functions sem JWT de usuário. Com verify_jwt = true (padrão),
# o gateway responde 401 ao OPTIONS e o navegador acusa falha de CORS no preflight.
#
# Sem verify_jwt = false, o gateway bloqueia OPTIONS (401) e o browser mostra erro de CORS no cadastro/login.
#
# Depois de alterar: redeploy a partir desta pasta, com projeto ligado:
#   supabase functions deploy login-username
#   supabase functions deploy register-username
#
# Também existe config.toml dentro de cada pasta da função (recomendado pelo Supabase).
#
# Só usa o painel Supabase? Em cada função, desative a exigência de JWT para invocação anónima.
#   (opcional, legado) auth-register-confirmed, auth-login-ensure
#
# project_id = ref do projeto (URL https://<ref>.supabase.co). Ajuste se for outro ambiente.
project_id = "ogpiinpoclfjnvrbthrq"

[functions.login-username]
verify_jwt = false

[functions.register-username]
verify_jwt = false

[functions.auth-register-confirmed]
verify_jwt = false

[functions.auth-login-ensure]
verify_jwt = false

[functions.dynamic-endpoint]
verify_jwt = false

[functions.sheet-outbox-sync]
verify_jwt = false
