# Render — dois ambientes no mesmo repo:
#   homologacao → testes (Supabase cópia qvtnzyqdfhupfsqdqrel)
#   master      → produção (Supabase original zvazpqdvnlecqadxacgv)
#
# Fluxo: push em homologacao → validar → merge em master → produção atualiza.
services:
  - type: web
    name: doca-livre-wms-light-prod
    runtime: static
    branch: master
    rootDir: frontend
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci --no-audit --no-fund && NODE_ENV=production npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_SUPABASE_URL
        value: https://zvazpqdvnlecqadxacgv.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  - type: web
    name: doca-livre-wms-light-homolog
    runtime: static
    branch: homologacao
    rootDir: frontend
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci --no-audit --no-fund && NODE_ENV=production npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_SUPABASE_URL
        value: https://qvtnzyqdfhupfsqdqrel.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
