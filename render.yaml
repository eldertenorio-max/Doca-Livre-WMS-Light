# Render — dois ambientes no mesmo repo:
#   homologacao → deploy automático a cada push (autoDeployTrigger: commit)
#   master      → deploy automático ao promover (.\scripts\publicar-producao.ps1)
#
# Fluxo Git:
#   1. git checkout homologacao → alterar → push → homolog atualiza sozinha
#   2. testar em https://doca-livre-wms-light-homolog.onrender.com
#   3. .\scripts\publicar-producao.ps1 → merge homologacao → master → produção atualiza
services:
  - type: web
    name: doca-livre-wms-light-prod
    runtime: static
    branch: master
    autoDeployTrigger: commit
    rootDir: frontend
    buildCommand: npm ci --no-audit --no-fund && NODE_ENV=production npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_SUPABASE_URL
        value: https://zvazpqdvnlecqadxacgv.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  - type: web
    name: doca-livre-wms-light-homolog
    runtime: static
    branch: homologacao
    autoDeployTrigger: commit
    rootDir: frontend
    buildCommand: npm ci --no-audit --no-fund && NODE_ENV=production npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_SUPABASE_URL
        value: https://qvtnzyqdfhupfsqdqrel.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
